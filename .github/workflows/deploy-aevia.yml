name: Build & deploy Aevia (anti-aging platform)

# GitHub Pages obsluhuje jeden web na repozitář. Tento workflow nasazuje Aevii
# na project-pages podcestu /odrudy.cz/ a tím nahrazuje předchozí Pages obsah.
on:
  push:
    branches: ["main"]
    paths:
      - "anti-aging-platform/**"
      - ".github/workflows/deploy-aevia.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build static site
        run: node build/build.mjs
        working-directory: anti-aging-platform
        env:
          BASE_PATH: /odrudy.cz
          SITE_ORIGIN: https://radludvik.github.io
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: anti-aging-platform/site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
