name: Obohatit o INCI (incidecoder)

# Pro produkty v data/heureka-category.json dohledá složení (INCI) z
# incidecoder.com a rozpozná účinné látky. Commitne výsledek. Resumovatelné
# (přeskočí už hotové) — spusť vícekrát, dokud nebude vše.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Kolik produktů zpracovat (0 = vše)"
        default: "150"
      file:
        description: "Soubor s produkty"
        default: "anti-aging-platform/data/heureka-category.json"
      force:
        description: "Přepočítat i už hotové (1 = ano)"
        default: "0"
      only_miss:
        description: "Znovu jen nenalezené (1 = ano)"
        default: "0"
      delay:
        description: "Prodleva mezi produkty (ms) — vyšší = menší riziko přiškrcení"
        default: "800"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Dohledej INCI
        run: node anti-aging-platform/build/enrich-inci.mjs
        env:
          FILE: ${{ inputs.file }}
          LIMIT: ${{ inputs.limit }}
          FORCE: ${{ inputs.force }}
          ONLY_MISS: ${{ inputs.only_miss }}
          DELAY: ${{ inputs.delay }}
      - name: Commit výsledku
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.file }}"
          git diff --cached --quiet && echo "Žádné změny" && exit 0
          git commit -m "Enrich INCI from incidecoder (CI)"
          git pull --rebase origin main
          git push origin main
